{% extends "_base.html" %}

{% block content %}
    <h2>¿Estás seguro de que deseas eliminar este artículo {{ article.title }}?</h2>
    <p><strong>{{ article.title }}</strong></p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Sí, eliminar</button>
        <a href="{% url 'article-detail' article.pk %}">Cancelar</a>
    </form>
{% endblock content %}
